<body>
  <nav aria-label="Main navigation">
    <div class="links_contain">
      <a href="./pages/watches.html"><img src="../img/google-logo.png" alt="logo" /></a>

      <ul class="links">
        <li><a href="#">Phones</a></li>
        <li>
          <a href="../index.html" aria-current="page">Earbuds</a>
        </li>
        <li><a href="../pages/watches.html">Watches</a></li>
        <li><a href="#">Smart Home</a></li>
        <li><a href="#">Accessories</a></li>
        <li><a href="#">Subscriptions</a></li>

    <ul class="icons">

        <a href="#"><img src="../img/icons/Search.svg" alt="Search" /></a>
      </li>
      <li>
        <a href="#"><img src="../img/icons/Help.svg" alt="Help" /></a>

      <li>
        <a href="../pages/cart.html"><img src="../img/icons/Cart.svg" alt="Cart" /><span id="cart-count">0</span></a>

      </li>
    </ul>

<main>
  <section class="cart-wrapper">
        <h1>Tu carrito</h1>
        
        <div id="cart-items-container"></div>

        <div id="cart-footer" class="hidden">
            <div class="total-section">
                <span>Total estimado:</span>
                <span id="cart-total-amount">0 €</span>
            </div>
            <button id="checkout-btn" class="buy-button">Finalizar compra</button>
        </div>

        <div id="empty-cart-msg" class="hidden">
            <p>Tu carrito está vacío actualmente.</p>
            <a href="../index.html" class="back-link">Continuar comprando</a>
        </div>
    </section>
</main>

  <script src="../scripts/cart.js"></script>
